<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CS2 Case Lab</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Exo+2:wght@400;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Exo 2', sans-serif;
    background: #0d0d0f; color: #e8e8e8; text-align: center; min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 40% at 50% 0%, rgba(235,75,75,0.08) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px);
  }
  header { padding: 28px 20px 14px; border-bottom: 1px solid rgba(255,255,255,0.06); }
  h1 { font-family: 'Rajdhani', sans-serif; font-size: 2.2rem; letter-spacing: 4px; text-transform: uppercase; color: #fff; text-shadow: 0 0 30px rgba(235,75,75,0.5); }
  h1 span { color: #eb4b4b; }

  /* ── CASE GRID ── */
  #case-selector-wrap { width: 90%; max-width: 960px; margin: 18px auto 4px; }
  #case-selector-label { font-family: 'Rajdhani', sans-serif; font-size: .8rem; letter-spacing: 2px; text-transform: uppercase; color: #555; text-align: left; margin-bottom: 6px; }
  #case-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px;
    max-height: 260px; overflow-y: auto; background: #111113;
    border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 10px;
    scrollbar-width: thin; scrollbar-color: #333 transparent;
  }
  .case-card { display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 8px 6px; border-radius: 6px; border: 2px solid transparent; background: #1a1a1e; cursor: pointer; transition: border-color .15s, background .15s; position: relative; }
  .case-card:hover { background: #222226; border-color: #444; }
  .case-card.selected { border-color: #eb4b4b; background: #1f1519; }
  .case-card img { width: 80px; height: 60px; object-fit: contain; }
  .case-card .cname { font-size: 10px; line-height: 1.3; color: #aaa; text-align: center; word-break: break-word; }
  .case-card.selected .cname { color: #fff; }
  .case-price-tag {
    font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 11px;
    color: #4caf82; background: rgba(76,175,130,0.12); border: 1px solid rgba(76,175,130,0.25);
    border-radius: 3px; padding: 1px 5px; margin-top: 2px;
  }
  .case-price-tag.loading { color: #444; background: none; border-color: transparent; }
  #case-loading { color: #444; font-size: .9rem; padding: 30px; grid-column: 1/-1; }

  /* ── CONTROLS ── */
  .controls { display: flex; justify-content: center; align-items: center; gap: 14px; padding: 16px 20px; flex-wrap: wrap; }
  button { padding: 10px 26px; font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; border: none; border-radius: 4px; transition: .15s; }
  #btn-open { background: linear-gradient(135deg, #eb4b4b, #c0392b); color: #fff; box-shadow: 0 0 20px rgba(235,75,75,0.35); }
  #btn-open:hover:not(:disabled) { box-shadow: 0 0 30px rgba(235,75,75,0.6); filter: brightness(1.1); }
  #btn-open:disabled, #btn-batch:disabled { opacity: .4; cursor: not-allowed; }
  #btn-skip { background: rgba(255,255,255,0.08); color: #aaa; border: 1px solid rgba(255,255,255,0.12); }
  #btn-skip:hover:not(:disabled) { background: rgba(255,255,255,0.14); color: #fff; }
  #btn-skip:disabled { opacity: .3; cursor: not-allowed; }
  #btn-batch { background: rgba(244,180,0,0.12); color: #f4b400; border: 1px solid rgba(244,180,0,0.25); }
  #btn-batch:hover:not(:disabled) { background: rgba(244,180,0,0.22); }
  .stattrak-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; background: rgba(244,180,0,0.08); border: 1px solid rgba(244,180,0,0.2); border-radius: 4px; padding: 9px 16px; transition: .15s; }
  .stattrak-toggle:hover { background: rgba(244,180,0,0.14); }
  .stattrak-toggle input { accent-color: #f4b400; width: 16px; height: 16px; cursor: pointer; }
  .stattrak-toggle span { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: .95rem; letter-spacing: 1px; color: #f4b400; text-transform: uppercase; }

  /* ── REEL ── */
  #reel-wrap { position: relative; width: 90%; max-width: 960px; height: 190px; margin: 0 auto 10px; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden; background: #141416; box-shadow: inset 0 0 40px rgba(0,0,0,0.6); }
  #reel-wrap::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, #141416 0%, transparent 18%, transparent 82%, #141416 100%); z-index: 5; pointer-events: none; }
  #reel-wrap::after { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 3px; height: 100%; background: linear-gradient(180deg, transparent, #f4b400 20%, #f4b400 80%, transparent); z-index: 10; box-shadow: 0 0 12px rgba(244,180,0,0.8); }
  #reel { display: flex; position: absolute; top: 0; left: 0; height: 100%; align-items: center; will-change: transform; }
  .skin-card { flex-shrink: 0; width: 150px; margin: 0 4px; text-align: center; border: 2px solid #333; border-radius: 6px; padding: 8px 6px 6px; background: #1a1a1e; user-select: none; overflow: hidden; }
  .skin-card img { width: 110px; height: 80px; object-fit: contain; display: block; margin: 0 auto 5px; }
  .skin-card .card-name { font-size: 11px; line-height: 1.3; color: #ccc; word-break: break-word; }
  .stattrak-badge { display: inline-block; background: #f4b400; color: #111; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 10px; letter-spacing: .5px; padding: 1px 5px; border-radius: 3px; margin-bottom: 3px; }

  /* ── RESULT ── */
  #result { min-height: 60px; margin: 14px auto; max-width: 560px; padding: 18px 22px; border-radius: 8px; }
  #result.has-result { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); }
  .result-name { font-family: 'Rajdhani', sans-serif; font-size: 1.5rem; font-weight: 700; letter-spacing: 1px; margin-bottom: 4px; }
  .result-meta { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; font-size: .82rem; opacity: .6; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; }
  .result-price-row { display: flex; justify-content: center; align-items: center; gap: 18px; flex-wrap: wrap; }
  .price-block { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .price-label { font-size: .68rem; text-transform: uppercase; letter-spacing: 1.5px; opacity: .45; }
  .price-val { font-family: 'Rajdhani', sans-serif; font-size: 1.25rem; font-weight: 700; }
  .price-val.green { color: #4caf82; }
  .price-val.red { color: #eb4b4b; }
  .price-val.yellow { color: #f4b400; }
  .price-val.dim { color: #444; font-size: .85rem; font-weight: 400; }
  .price-divider { width: 1px; height: 36px; background: rgba(255,255,255,0.1); }

  /* ── HISTORY ── */
  #history-wrap { margin: 0 auto 30px; width: 90%; max-width: 700px; }
  #history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  #history-label { font-family: 'Rajdhani', sans-serif; font-size: .85rem; letter-spacing: 2px; text-transform: uppercase; color: #555; }
  #history-stats { display: flex; align-items: center; gap: 14px; }

  .stat-chip { display: flex; flex-direction: column; align-items: flex-end; }
  .stat-chip .slabel { font-size: .6rem; text-transform: uppercase; letter-spacing: 1.5px; opacity: .35; }
  .stat-chip .sval { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: .95rem; letter-spacing: .5px; }
  #chip-spent .sval { color: #eb4b4b; }
  #chip-value .sval { color: #4caf82; }
  #chip-profit .sval { color: #f4b400; }
  #chip-spent .sval.zero, #chip-value .sval.zero, #chip-profit .sval.zero { color: #333; }

  #btn-clear { padding: 5px 14px; font-size: .78rem; letter-spacing: 1px; background: rgba(235,75,75,0.1); color: #eb4b4b; border: 1px solid rgba(235,75,75,0.25); border-radius: 3px; }
  #btn-clear:hover { background: rgba(235,75,75,0.2); }

  #history { max-height: 240px; overflow-y: auto; background: #111113; border: 1px solid rgba(255,255,255,0.07); border-radius: 6px; padding: 4px 10px; scrollbar-width: thin; scrollbar-color: #333 transparent; }
  .hist-entry { display: flex; align-items: center; padding: 7px 4px; border-bottom: 1px solid rgba(255,255,255,0.04); gap: 8px; }
  .hist-entry:last-child { border-bottom: none; }
  .hist-name { text-align: left; font-size: .85rem; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .hist-wear { font-size: .68rem; opacity: .38; letter-spacing: 1px; text-transform: uppercase; flex-shrink: 0; }
  .hist-price { font-family: 'Rajdhani', sans-serif; font-size: .9rem; font-weight: 700; flex-shrink: 0; min-width: 60px; text-align: right; }
  .hist-price.green { color: #4caf82; }
  .hist-price.dim { color: #333; font-weight: 400; font-size: .75rem; }
  .hist-price.loading { color: #444; font-size: .75rem; font-style: italic; }

  /* ── CONFIRM ── */
  #confirm-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); align-items: center; justify-content: center; }
  #confirm-overlay.open { display: flex; }
  #confirm-box { background: #161618; border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 32px 32px 26px; max-width: 340px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.7); }
  #confirm-box h3 { font-family: 'Rajdhani', sans-serif; font-size: 1.25rem; font-weight: 700; letter-spacing: 1px; margin-bottom: 8px; color: #fff; }
  #confirm-box p { font-size: .85rem; color: #666; margin-bottom: 22px; line-height: 1.5; }
  .confirm-btns { display: flex; gap: 10px; justify-content: center; }
  #confirm-yes { background: linear-gradient(135deg, #eb4b4b, #c0392b); color: #fff; padding: 9px 24px; }
  #confirm-yes:hover { filter: brightness(1.1); }
  #confirm-no { background: rgba(255,255,255,0.08); color: #aaa; border: 1px solid rgba(255,255,255,0.12); padding: 9px 24px; }
  #confirm-no:hover { background: rgba(255,255,255,0.14); color: #fff; }
</style>
</head>
<body>

<header><h1>CS2 <span>Case</span> Lab</h1></header>

<div id="case-selector-wrap">
  <div id="case-selector-label">Select a Case</div>
  <div id="case-grid"><div id="case-loading">Loading cases…</div></div>
</div>

<div class="controls">
  <label class="stattrak-toggle">
    <input type="checkbox" id="stattrak">
    <span>StatTrak™</span>
  </label>
  <button id="btn-open" onclick="openCase()" disabled>Open Case</button>
  <button id="btn-skip" onclick="skipAnimation()" disabled>Skip</button>
  <button id="btn-batch" onclick="rollBatch(1000)" disabled>Roll 1000</button>
</div>

<div id="reel-wrap"><div id="reel"></div></div>
<div id="result"></div>

<div id="history-wrap">
  <div id="history-header">
    <div id="history-label">Recent Drops</div>
    <div id="history-stats">
      <div class="stat-chip" id="chip-spent">
        <span class="slabel">Spent</span>
        <span class="sval zero" id="val-spent">$0.00</span>
      </div>
      <div class="stat-chip" id="chip-value">
        <span class="slabel">Value</span>
        <span class="sval zero" id="val-value">$0.00</span>
      </div>
      <div class="stat-chip" id="chip-profit">
        <span class="slabel">Profit</span>
        <span class="sval zero" id="val-profit">$0.00</span>
      </div>
      <button id="btn-clear" onclick="askClear()">Clear</button>
    </div>
  </div>
  <div id="history"></div>
</div>

<div id="confirm-overlay">
  <div id="confirm-box">
    <h3>Clear Recent Drops?</h3>
    <p>This will remove all drops and reset the spent / value / profit counters.</p>
    <div class="confirm-btns">
      <button id="confirm-yes" onclick="confirmClear()">Clear All</button>
      <button id="confirm-no" onclick="closeConfirm()">Cancel</button>
    </div>
  </div>
</div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const CARD_W     = 158;
const TOTAL      = 60;
const WINNER_IDX = 47;
const ANIM_MS    = 5200;

const RARITY_ORDER = [
  { tag:"Mil-Spec Grade",  chance:79.92, color:"#5e98d9" },
  { tag:"Restricted",      chance:15.98, color:"#8847ff" },
  { tag:"Classified",      chance:3.20,  color:"#d32ce6" },
  { tag:"Covert",          chance:0.64,  color:"#eb4b4b" },
  { tag:"Extraordinary",   chance:0.26,  color:"#f4b400" },
];
const RARITY_META = {
  "Mil-Spec Grade":   {label:"Mil-Spec",   color:"#5e98d9"},
  "Industrial Grade": {label:"Mil-Spec",   color:"#5e98d9"},
  "Restricted":       {label:"Restricted", color:"#8847ff"},
  "Classified":       {label:"Classified", color:"#d32ce6"},
  "Covert":           {label:"Covert",     color:"#eb4b4b"},
  "Extraordinary":    {label:"★ Rare",     color:"#f4b400"},
  "Contraband":       {label:"Contraband", color:"#f4b400"},
};
const WEAR_RANGES = [
  {name:"Factory New",    min:0.00, max:0.07},
  {name:"Minimal Wear",   min:0.07, max:0.15},
  {name:"Field-Tested",   min:0.15, max:0.38},
  {name:"Well-Worn",      min:0.38, max:0.45},
  {name:"Battle-Scarred", min:0.45, max:1.00},
];

// ── State ─────────────────────────────────────────────────────────────────────
let casesDB = [], skinsLookup = {};
let selectedCase = null, casePriceCache = {};
let spinning = false, skipFn = null;
let tickInterval = null, lastTickIdx = -1;
let totalSpent = 0, totalValue = 0;

// ── Audio ─────────────────────────────────────────────────────────────────────
function playTick() {
  try { const a = new Audio('roll.wav'); a.volume = 0.45; a.play().catch(()=>{}); } catch(e){}
}

// ── Steam Market price API ────────────────────────────────────────────────────
// Fetches price for a single market_hash_name from Steam's public priceoverview endpoint.
// No API key needed. Returns USD median price or null.
// We use a simple in-memory cache to avoid repeat requests for the same item.
const priceCache = {};

async function fetchSteamPrice(marketHashName) {
  if (priceCache[marketHashName] !== undefined) return priceCache[marketHashName];
  try {
    const url = `https://steamcommunity.com/market/priceoverview/?appid=730&currency=1&market_hash_name=${encodeURIComponent(marketHashName)}`;
    const res = await fetch(url);
    if (!res.ok) { priceCache[marketHashName] = null; return null; }
    const data = await res.json();
    if (!data.success) { priceCache[marketHashName] = null; return null; }
    // median_price preferred; fallback to lowest_price
    const raw = data.median_price || data.lowest_price || null;
    // raw is a string like "$12.34" — strip currency symbol and parse
    const val = raw ? parseFloat(raw.replace(/[^0-9.]/g, '')) : null;
    priceCache[marketHashName] = (val && !isNaN(val)) ? val : null;
    return priceCache[marketHashName];
  } catch(e) {
    priceCache[marketHashName] = null;
    return null;
  }
}

// Build the exact market_hash_name for a skin + wear + stattrak combo
function buildHashName(skin, wearName, isStatTrak) {
  const base = (skin.market_hash_name || skin.name)
    .replace(/\s*\((Factory New|Minimal Wear|Field-Tested|Well-Worn|Battle-Scarred)\)\s*$/, '')
    .trim();
  const st = isStatTrak ? 'StatTrak™ ' : '';
  return `${st}${base} (${wearName})`;
}

// ── Load data ─────────────────────────────────────────────────────────────────
Promise.all([
  fetch("https://raw.githubusercontent.com/ByMykel/CSGO-API/main/public/api/en/skins.json").then(r=>r.json()),
  fetch("https://raw.githubusercontent.com/ByMykel/CSGO-API/main/public/api/en/crates.json").then(r=>r.json()),
]).then(([skins, crates]) => {
  skins.forEach(s => { if (s.paint_index) skinsLookup[s.paint_index] = s; });
  casesDB = crates.filter(c => c.type === "Case" && c.contains?.length > 0);
  casesDB.sort((a,b) => (b.first_sale_date||'').localeCompare(a.first_sale_date||''));
  renderCaseGrid();
}).catch(() => {
  document.getElementById('case-loading').textContent = 'Failed to load data.';
});

// ── Case grid + case prices ───────────────────────────────────────────────────
function renderCaseGrid() {
  const grid = document.getElementById('case-grid');
  grid.innerHTML = '';
  casesDB.forEach((c, i) => {
    const el = document.createElement('div');
    el.className = 'case-card';
    el.dataset.idx = i;
    el.innerHTML = `
      <img src="${c.image}" loading="lazy" onerror="this.style.visibility='hidden'">
      <span class="cname">${c.name}</span>
      <span class="case-price-tag loading" id="cprice-${i}">…</span>
    `;
    el.addEventListener('click', () => selectCase(i, el));
    grid.appendChild(el);
    // Fetch case price asynchronously
    fetchSteamPrice(c.name).then(p => {
      const tag = document.getElementById(`cprice-${i}`);
      if (!tag) return;
      if (p) {
        tag.textContent = '$' + p.toFixed(2);
        tag.classList.remove('loading');
        casePriceCache[c.name] = p;
      } else {
        tag.textContent = '';
        tag.classList.add('loading');
        casePriceCache[c.name] = null;
      }
    });
  });
}

function selectCase(idx, el) {
  if (spinning) return;
  document.querySelectorAll('.case-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedCase = casesDB[idx];
  document.getElementById('btn-open').disabled  = false;
  document.getElementById('btn-batch').disabled = false;
  document.getElementById('result').innerHTML   = '';
  document.getElementById('result').classList.remove('has-result');
}

// ── Skin/rarity pick ──────────────────────────────────────────────────────────
function pickSkinFromCase(cs) {
  const pool    = cs.contains      || [];
  const special = cs.contains_rare || [];
  const buckets = {};
  pool.forEach(s => {
    const key = s.rarity?.name || 'Mil-Spec Grade';
    if (!buckets[key]) buckets[key] = [];
    buckets[key].push(s);
  });
  const roll = Math.random() * 100;
  let sum = 0;
  for (const tier of RARITY_ORDER) {
    sum += tier.chance;
    if (roll <= sum) {
      if (tier.tag === 'Extraordinary' && special.length)
        return special[Math.floor(Math.random() * special.length)];
      const bucket = buckets[tier.tag]
        || buckets[Object.keys(buckets).find(k=>k.startsWith(tier.tag.split(' ')[0]))]
        || pool;
      const src = (bucket && bucket.length) ? bucket : pool;
      return src[Math.floor(Math.random() * src.length)];
    }
  }
  return pool[Math.floor(Math.random() * pool.length)];
}

function rarityMeta(skin) {
  return RARITY_META[skin.rarity?.name] || {label: skin.rarity?.name||'?', color:'#888'};
}
function isKnife(skin) {
  return skin.rarity?.name === 'Extraordinary' || (skin.name||'').startsWith('★');
}
function canStatTrak(skin) {
  if (isKnife(skin)) return false;
  const full = skinsLookup[skin.paint_index];
  return full ? full.stattrak !== false : true;
}

// ── Wear pick ─────────────────────────────────────────────────────────────────
function pickWear(skin) {
  const full = skinsLookup[skin.paint_index];
  const minF = full?.min_float ?? 0.0;
  const maxF = full?.max_float ?? 1.0;
  const available = WEAR_RANGES.filter(w => w.max > minF && w.min < maxF);
  if (!available.length) return { float: minF + Math.random()*(maxF-minF), wear: WEAR_RANGES[2].name };
  const cond = available[Math.floor(Math.random() * available.length)];
  const lo = Math.max(cond.min, minF), hi = Math.min(cond.max, maxF);
  return { float: parseFloat((lo + Math.random()*(hi-lo)).toFixed(6)), wear: cond.name };
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function setSpinning(val) {
  spinning = val;
  document.getElementById('btn-open').disabled  = val;
  document.getElementById('btn-skip').disabled  = !val;
  document.getElementById('btn-batch').disabled = val;
}
function computeTargetX() {
  const wrap = document.getElementById('reel-wrap');
  return WINNER_IDX * CARD_W + CARD_W / 2 - wrap.offsetWidth / 2;
}

// ── Build reel ────────────────────────────────────────────────────────────────
function buildReel(cs, winner, wearInfo, isStatTrak) {
  const reel = document.getElementById('reel');
  reel.innerHTML = '';
  reel.style.transition = 'none';
  reel.style.transform  = 'translateX(0)';
  const allSkins = [...(cs.contains||[]), ...(cs.contains_rare||[])];
  for (let i = 0; i < TOTAL; i++) {
    const skin  = (i === WINNER_IDX) ? winner : allSkins[Math.floor(Math.random()*allSkins.length)];
    const isWin = i === WINNER_IDX;
    const meta  = rarityMeta(skin);
    const st    = isWin && isStatTrak && canStatTrak(skin);
    const el = document.createElement('div');
    el.className = 'skin-card';
    el.style.borderColor = meta.color;
    el.innerHTML = `
      ${st?'<span class="stattrak-badge">StatTrak™</span><br>':''}
      <img src="${skin.image}" loading="lazy" onerror="this.style.visibility='hidden'">
      <div class="card-name">${skin.name}${isWin?`<br><span style="opacity:.55;font-size:10px">${wearInfo.wear}</span>`:''}</div>
    `;
    reel.appendChild(el);
  }
}

// ── Tick ───────────────────────────────────────────────────────────────────────
function startTicks() {
  lastTickIdx = -1;
  const reel = document.getElementById('reel');
  const wc   = document.getElementById('reel-wrap').offsetWidth / 2;
  tickInterval = setInterval(() => {
    const mat = new DOMMatrix(getComputedStyle(reel).transform);
    const idx = Math.round((-mat.m41 + wc - CARD_W/2) / CARD_W);
    if (idx !== lastTickIdx && idx >= 0 && idx < TOTAL) { lastTickIdx = idx; playTick(); }
  }, 50);
}
function stopTicks() { clearInterval(tickInterval); tickInterval = null; }

// ── Open case ─────────────────────────────────────────────────────────────────
function openCase() {
  if (!selectedCase) { alert("Pick a case first!"); return; }
  if (spinning) return;
  setSpinning(true);
  document.getElementById('result').innerHTML = '';
  document.getElementById('result').classList.remove('has-result');

  const isStatTrak = document.getElementById('stattrak').checked;
  const winner = pickSkinFromCase(selectedCase);
  const wearInfo = isKnife(winner) ? {float:0.01, wear:'Factory New'} : pickWear(winner);
  const applyStatTrak = isStatTrak && canStatTrak(winner);

  buildReel(selectedCase, winner, wearInfo, applyStatTrak);

  const reel = document.getElementById('reel');
  void reel.offsetWidth;

  const finalX = computeTargetX() + (Math.random()-0.5)*40;
  reel.style.transition = `transform ${ANIM_MS}ms cubic-bezier(0.12, 0.8, 0.2, 1)`;
  reel.style.transform  = `translateX(-${finalX}px)`;
  startTicks();

  let done = false;
  function finish() {
    if (done) return; done = true;
    stopTicks(); skipFn = null; setSpinning(false);
    showResult(winner, wearInfo, applyStatTrak);
  }
  const timer = setTimeout(finish, ANIM_MS + 200);
  skipFn = () => {
    clearTimeout(timer); stopTicks();
    reel.style.transition = 'none';
    reel.style.transform  = `translateX(-${finalX}px)`;
    skipFn = null; setSpinning(false);
    showResult(winner, wearInfo, applyStatTrak); done = true;
  };
}
function skipAnimation() { if (skipFn) skipFn(); }

// ── Show result + async price fetch ──────────────────────────────────────────
async function showResult(skin, wearInfo, isStatTrak) {
  const meta     = rarityMeta(skin);
  const stLabel  = isStatTrak ? 'StatTrak™ ' : '';
  const display  = stLabel + skin.name;
  const hashName = buildHashName(skin, wearInfo.wear, isStatTrak);
  const caseName = selectedCase.name;
  const caseCost = casePriceCache[caseName] ?? null;

  // Show result immediately with loading price state
  const res = document.getElementById('result');
  res.classList.add('has-result');
  res.style.borderColor = meta.color + '44';
  res.innerHTML = `
    <div class="result-name" style="color:${meta.color}">${display}</div>
    <div class="result-meta">
      <span>${meta.label}</span>
      <span>${wearInfo.wear}</span>
      <span>${wearInfo.float.toFixed(6)}</span>
    </div>
    <div class="result-price-row" id="res-prices">
      ${caseCost != null ? `
        <div class="price-block">
          <span class="price-label">Case Cost</span>
          <span class="price-val red">-$${caseCost.toFixed(2)}</span>
        </div>
        <div class="price-divider"></div>
      ` : ''}
      <div class="price-block">
        <span class="price-label">Skin Value</span>
        <span class="price-val dim" id="res-skin-price">Fetching…</span>
      </div>
      <div class="price-divider" id="res-profit-divider" style="display:none"></div>
      <div class="price-block" id="res-profit-block" style="display:none">
        <span class="price-label">Profit</span>
        <span class="price-val" id="res-profit-val"></span>
      </div>
    </div>
  `;

  // Add history entry immediately with loading price
  const histEntry = addHistoryEntry(display, wearInfo, meta, null, true);

  // Count this case opening in spent total
  if (caseCost != null) {
    totalSpent += caseCost;
    updateCounters();
  }

  // Fetch skin price async
  const skinPrice = await fetchSteamPrice(hashName);

  // Update result panel
  const skinPriceEl = document.getElementById('res-skin-price');
  if (skinPriceEl) {
    if (skinPrice != null) {
      skinPriceEl.textContent = '$' + skinPrice.toFixed(2);
      skinPriceEl.className = 'price-val green';
      // Show profit if we have case cost
      if (caseCost != null) {
        const profit = skinPrice - caseCost;
        const profitEl = document.getElementById('res-profit-val');
        const divEl    = document.getElementById('res-profit-divider');
        const blockEl  = document.getElementById('res-profit-block');
        if (profitEl && divEl && blockEl) {
          profitEl.textContent = (profit >= 0 ? '+' : '') + '$' + profit.toFixed(2);
          profitEl.className = 'price-val ' + (profit >= 0 ? 'green' : 'red');
          divEl.style.display  = '';
          blockEl.style.display = '';
        }
      }
    } else {
      skinPriceEl.textContent = 'N/A';
      skinPriceEl.className = 'price-val dim';
    }
  }

  // Update history entry price
  if (histEntry) {
    const priceEl = histEntry.querySelector('.hist-price');
    if (priceEl) {
      if (skinPrice != null) {
        priceEl.textContent = '$' + skinPrice.toFixed(2);
        priceEl.className = 'hist-price green';
      } else {
        priceEl.textContent = 'N/A';
        priceEl.className = 'hist-price dim';
      }
    }
  }

  // Update totals
  if (skinPrice != null) {
    totalValue += skinPrice;
    updateCounters();
  }
}

// ── History ───────────────────────────────────────────────────────────────────
function addHistoryEntry(display, wearInfo, meta, price, loading) {
  const entry = document.createElement('div');
  entry.className = 'hist-entry';
  entry.innerHTML = `
    <span class="hist-name" style="color:${meta.color}">${display}</span>
    <span class="hist-wear">${wearInfo.wear}</span>
    <span class="hist-price ${loading ? 'loading' : (price ? 'green' : 'dim')}">${loading ? '…' : (price ? '$'+price.toFixed(2) : 'N/A')}</span>
  `;
  document.getElementById('history').prepend(entry);
  return entry;
}

// ── Counters ──────────────────────────────────────────────────────────────────
function updateCounters() {
  const profit = totalValue - totalSpent;

  const spentEl  = document.getElementById('val-spent');
  const valueEl  = document.getElementById('val-value');
  const profitEl = document.getElementById('val-profit');

  spentEl.textContent  = '$' + totalSpent.toFixed(2);
  valueEl.textContent  = '$' + totalValue.toFixed(2);
  profitEl.textContent = (profit >= 0 ? '+' : '') + '$' + profit.toFixed(2);

  spentEl.className  = 'sval' + (totalSpent === 0 ? ' zero' : '');
  valueEl.className  = 'sval' + (totalValue === 0 ? ' zero' : '');
  profitEl.className = 'sval' + (totalSpent === 0 && totalValue === 0 ? ' zero' : '');

  // Recolor profit chip dynamically
  const chip = document.getElementById('chip-profit');
  chip.querySelector('.sval').style.color = profit > 0 ? '#4caf82' : profit < 0 ? '#eb4b4b' : '#f4b400';
}

// ── Clear with confirmation ───────────────────────────────────────────────────
function askClear() {
  if (!document.getElementById('history').children.length) return;
  document.getElementById('confirm-overlay').classList.add('open');
}
function closeConfirm() { document.getElementById('confirm-overlay').classList.remove('open'); }
function confirmClear() {
  document.getElementById('history').innerHTML = '';
  totalSpent = 0; totalValue = 0;
  updateCounters();
  closeConfirm();
}
document.getElementById('confirm-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('confirm-overlay')) closeConfirm();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeConfirm(); });

// ── Batch ─────────────────────────────────────────────────────────────────────
function rollBatch(n) {
  if (!selectedCase) { alert("Pick a case first!"); return; }
  const counts = {};
  for (let i = 0; i < n; i++) {
    const label = rarityMeta(pickSkinFromCase(selectedCase)).label;
    counts[label] = (counts[label]||0) + 1;
  }
  let msg = `Results from ${n} rolls:\n${selectedCase.name}\n\n`;
  for (const [l,c] of Object.entries(counts).sort((a,b)=>b[1]-a[1]))
    msg += `${l}: ${c} (${((c/n)*100).toFixed(2)}%)\n`;
  alert(msg);
}
</script>
